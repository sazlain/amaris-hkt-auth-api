spring.application.name=auth-api
server.port=8080

spring.config.import=optional:file:.env[.properties]

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.types.print.banner=false

# Data initialization
# DESACTIVADO TEMPORALMENTE - Activar despu?s de crear el constraint
# spring.sql.init.mode=always
# spring.sql.init.data-locations=classpath:data.sql

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true

jwt.secret=dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1sb3R0ZXJ5LWFwaS1qd3Qtc2lnbmluZy0yMDI0
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# File Storage Configuration
app.upload.dir=uploads/receipts
app.upload.max-size=5242880

# Hackathon Token Revocation Configuration
hackathon.token-revocation.enabled=false
hackathon.token-revocation.min-interval-seconds=30
hackathon.token-revocation.max-interval-seconds=120

# Logging Configuration
logging.level.root=INFO
logging.level.com.amaris.hkt.auth.api=DEBUG
# Use LOG_DIR environment variable, or temp directory + project logs as fallback
logging.file.name=${LOG_DIR:${java.io.tmpdir}amaris-auth-api/logs}/auth-api.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
